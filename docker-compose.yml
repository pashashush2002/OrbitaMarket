services:
    apigateway:
        build: ./APIGateway
        container_name: server
        environment:
        - SERVER_PORT=8080
        - ORDERS_SERVICE_URL=http://orders-service:8081
        - PAYMENTS_SERVICE_URL=http://payments-service:8082
        ports:
        - "3030:8080"
        networks:
        - space-net
        depends_on:
        - db
    payments-service:
        build: ./PaymentsService
        container_name: payments-service
        environment:
        - SERVER_PORT=8082
        - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/payments_db
        - SPRING_KAFKA_BOOTSTRAP_SERVICES=kafka:9093
        networks:
        - space-net
        depends_on:
        - db
    orders-service:
        build: ./OrdersService
        container_name: orders-service
        environment:
        - SERVER_PORT=8081
        - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/orders_db
        - SPRING_KAFKA_BOOTSTRAP_SERVICES=kafka:9093
        networks:
        - space-net
        depends_on:
        - db
    db:
        image: postgres:16-alpine
        container_name: postgres-db
        environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=postgres
        ports:
        - "5431:5432"
        networks:
        - space-net
        volumes:
        - pgdata:/var/lib/postgresql/data
        - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    kafka:
        image: apache/kafka:latest
        container_name: kafka
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker, controller
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094,EXTERNAL://0.0.0.0:29093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,EXTERNAL://localhost:29093
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
            KAFKA_INNER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_NUM_PARTITIONS: 3
        ports:
            - "9093:9093"
            - "29093:29093"
        volumes:
            - ./data/kafka:/tmp/kraft-combined-logs
        networks:
            - space-net
    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: kafka-ui
        ports:
            - "8085:8080"
        environment:
            KAFKA_CLUSTERS_0_NAME: local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
        depends_on:
            - kafka
        networks:
            - space-net
    
networks:
    space-net:
        driver: bridge

volumes:
    pgdata: